title: "Coneixent-nos una mica millor"
questions:
  - title: Amb quantes pantalles estàs fent el curs?
    image: https://i.imgur.com/cu6YEWg.jpeg
    image_alt: Setup desproporcionat, en comptes de PC tot un rack i tres pantalles
    options:
      - "Amb la del portàtil d'ensenyament"
      - "Una pantalla de > 21 polzades"
      - "Dues pantalles"
      - "Dues o més pantalles"
    correct_answer: 0
    explanation: |
      T'aniria bé disposar de dues pantalles, una per fer el codi i l'altre per seguir el curs, però no és imprescindible.
      Si només tens una pantalla, pots utilitzar la funció de dividir la pantalla del sistema operatiu o canviar entre finestres o escriptoris virtuals.

  - title: Amb quin **sistema operatiu** fas el curs? o quin se li assembla més?
    image: https://i.imgur.com/SgsmNtm.jpeg
    image_alt: Samarreta de Tac OS, un sistema operatiu fictici amb logo de Taco.
    options:
      - "Amb la del portàtil d'ensenyament"
      - "Windows"
      - "GNU Linux"
      - "MacOS"
    correct_answer: 0
    explanation: |
      El programari que farem servir és multiplataforma, així que no importa el sistema operatiu que utilitzis.
      El portàtil d'ensenyament no et deixa executar instal·ladors, però podem posar els binaris i versions portables.


  - title: "És un **contracte** que defineix **mètodes** i propietats a implementar"
    options:
      - "Interfície (Interface)"
      - "Classe abstracta (Abstract class)"
      - "Classe final (Sealed class)"
      - "Registre (Record)"
    correct_answer: 1
    explanation: |
      En C#, una interfície defineix un contracte.

      ```c#
      public interface IUser
      {
          void SetPassword(string password);
          int Edat { get; set; }
      }
      ```
      Característiques d'una interfície:
      - No es pot instanciar una interfície.
      - Diverses classes poden complir una mateixa interfície.
      - Sí que pot complir d'altres interfícies.

  - title: Per què t'has decantat (principalement) per aquest curs?
    options:
      - "Tots els de IA ja estaven plens"
      - "Pel dotnet C#"
      - "M'agrada el Clean Code i l'arquitectura de software"
      - "Per què el professor em va venir a demanar que m'apuntés"
    correct_answer: 0
    explanation: |
      Un curs de 25h de programació pot ser molt dur. Hi haurà estones de programació intensa, i altres de més teòriques. És important que t'agradi el tema per mantenir la motivació.
      El dotnet i C# són tecnologies molt potents i versàtils, però el més important és que t'agradi la programació i l'arquitectura de software.


  - title: "Una classe abstracta **NO** pot"
    options:
      - "Heretar d'altres classes"
      - "Implementar interfícies"
      - "Instanciar-se amb `new()`"
      - "Tenir mètodes abstractes i implementats"
    correct_answer: 3
    explanation: |
      Una classe abstracta no es pot instanciar directament.

      ```c#
      public abstract class UserBase : IUser
      {
          public abstract void SetPassword(string password);
          public int Edat { get; set; }
      }
      ```
      Característiques d'una classe abstracta:
      - Pot heretar d'una altra classe, sigui abstracta o no.
      - Pot implementar interfícies.
      - Pot tenir mètodes abstractes i mètodes no abstractes.
      - No es pot instanciar directament, però sí que es pot instanciar una classe que hereti d'ella.


