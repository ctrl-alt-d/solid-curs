      Farem una mica de repàs de crear una solució amb projectes.



  - title: "Una propietat o mètode que es pot sobreescriure en una classe derivada es declara com"
    options:
      - "sealed"
      - "override"
      - "virtual"
      - "static"
    correct_answer: 3
    explanation: |
      A la classe base, un membre que volem permetre sobreescriure es marca com `virtual`.

      ```c#
      public class Animal
      {
          public virtual void Speak() { }
      }
      ```

      A la classe derivada, es fa servir `override` per canviar-ne la implementació.


  - title: Arquitectura del software i clean code
    options:
      - "M'encanta clean code, m'he llegit tots els llibres de Robert C. Martin i de Martin Fowler"
      - "Tinc coneixements bàsics i m'agrada el tema"
      - "No conec clean code, però crec que és important per fer bon software"
      - "El més important és que el codi funcioni, no m'importa tant com sigui d'ordenat o net"
    correct_answer: 0
    explanation: |
      Aquest curs se centra en l'arquitectura de software i el clean code, no parlarem d'algorismes,
      parlarem de com organitzar el codi per a que sigui mantenible i de qualitat.


  - title: "Una propietat o mètode que cal sobreescriure obligatòriament en una classe derivada es declara com"
    options:
      - "virtual"
      - "abstract"
      - "sealed"
      - "readonly"
    correct_answer: 2
    explanation: |
      Un membre `abstract` no té implementació a la classe base i obliga les classes derivades a implementar-lo.

      ```c#
      public abstract class Animal
      {
          public abstract void Speak();
      }
      ```

      Qualsevol classe no abstracta que hereti de `Animal` haurà de definir `Speak()`.


