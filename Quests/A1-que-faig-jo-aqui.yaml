  - title: "Una classe en C# pot implementar"
    options:
      - "Només una interfície"
      - "Múltiples interfícies"
      - "Cap interfície"
      - "Només interfícies abstractes"
    correct_answer: 2
    explanation: |
      En C#, una classe pot implementar tantes interfícies com calgui.

      ```c#
      public class AdminUser : IUser, IAuditable, INotify
      {
      }
      ```

      Això permet combinar responsabilitats a través de contractes sense herència múltiple de classes.


  - title: |
      Tabuladors o espais?

      ```c#
      public class User
      {
      <TAB>public string Name { get; set; }
      }
      ```
    options:
      - "Tabuladors"
      - "Espais"
      - "Amb ceba"
      - "Sense ceba"
    correct_answer: 0
    explanation: |
      La convenció és usar "four-character indents", quan l'IDE detecta un tabulador, el converteix en 4 espais.



  - title: "Una classe en C#"
    options:
      - "Pot heretar de múltiples classes"
      - "No pot heretar de cap classe"
      - "Com a màxim pot heretar d'una classe"
      - "Només pot heretar de classes abstractes"
    correct_answer: 3
    explanation: |
      C# no permet herència múltiple de classes: una classe derivada només pot tenir una classe base.

      ```c#
      public class Manager : Employee
      {
      }
      ```

      Per combinar més comportaments, s'utilitzen interfícies.


  - title: "Quan diem que una classe 'té un' (has-a), normalment parlem de"
    options:
      - "Herència"
      - "Composició o agregació"
      - "Polimorfisme"
      - "Encapsulació"
    correct_answer: 2
    explanation: |
      La relació "té un" indica que una classe conté o utilitza una altra classe com a part del seu estat o comportament.

      ```c#
      public class Order
      {
          public Customer Customer { get; set; }
      }
      ```

      `Order` té un `Customer`: això és composició/agregació, no herència.


  - title: "Quan diem que una classe 'és un' (is-a), normalment parlem de"
    options:
      - "Composició"
      - "Associació"
      - "Herència"
      - "Sobrecàrrega"
    correct_answer: 3
    explanation: |
      La relació "és un" descriu especialització: la classe derivada és un tipus de la classe base.

      ```c#
      public class Cat : Animal
      {
      }
      ```

      Un `Cat` és un `Animal`, per això parlem d'herència.


  - title: La meva experiència amb C#
    options:
      - "He treballat amb C# abans, però amb .NET Framework"
      - "No he treballat amb C#"
      - "Conec C#, he fet projectes petits i he seguit cursos online"
      - "Porto molts anys treballant amb C# i .NET"
    correct_answer: 0
    explanation: |
