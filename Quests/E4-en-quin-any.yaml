  - title: En quin any Winston Royce presenta el "Desenvolupament en cascada" (Waterfall)?
    image: https://upload.wikimedia.org/wikipedia/commons/b/b3/1970_Royce_Managing_the_Development_of_Large_Software_Systems_Fig4.PNG?_=20230815070100
    image_alt: Imatge que representa el model en cascada, amb les diferents fases del desenvolupament de programari representades com a cascades d'aigua.
    options:
      - "1961"
      - "1970"
      - "1979"
      - "1988"
    correct_answer: 2
    explanation: |
      "Managing the Development of Large Software Systems" és un article escrit per Winston Royce el 1970.
      En aquest article, Royce va descriure el model en cascada com un procés de desenvolupament de programari seqüencial,
      on cada fase del desenvolupament es completa abans de passar a la següent.
      Tot i que l'article no va ser escrit amb la intenció de promoure el model en cascada com a millor pràctica,
      va ser adoptat àmpliament com a estàndard en la indústria del programari durant molts anys.

      Crèdits Imatge: https://commons.wikimedia.org/wiki/File:1970_Royce_Managing_the_Development_of_Large_Software_Systems_Fig4.PNG

